# blueprint (branch main). versao python: runtime.txt
#
# postgres gratis no render (uma conta free costuma ter limite de um banco free).
# supabase: apague o bloco databases e a entrada DATABASE_URL abaixo; configure DATABASE_URL no painel.

databases:
  - name: sigad-pg
    plan: free
    region: frankfurt

services:
  - type: web
    name: sigad
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn sigad.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sigad-pg
          property: connectionString
