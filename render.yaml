# Blueprint opcional: no painel Render use "New" -> "Blueprint" e aponte para este repo,
# ou crie um Web Service manualmente e copie build/start/preDeploy dos comentários abaixo.
#
# Variáveis que você deve definir no painel (Environment), como Secret:
#   DATABASE_URL  — Postgres (Supabase Session pooler ou Postgres criado no Render)
#   SECRET_KEY    — string longa e aleatória (ex.: python -c "import secrets; print(secrets.token_urlsafe(48))")

services:
  - type: web
    name: sigad
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate --noinput
    startCommand: gunicorn sigad.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DEBUG
        value: "False"
