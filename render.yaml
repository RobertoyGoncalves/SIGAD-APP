# Render Blueprint (branch main). Python version: see runtime.txt
#
# Postgres: included below (Render free DB; conta free costuma permitir apenas 1 DB free).
# To use Supabase instead: delete the "databases" block and the DATABASE_URL envVar
# below, then set DATABASE_URL manually in the service Environment on Render.

databases:
  - name: sigad-pg
    plan: free
    region: frankfurt

services:
  - type: web
    name: sigad
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn sigad.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sigad-pg
          property: connectionString
